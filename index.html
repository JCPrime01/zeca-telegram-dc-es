<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bilhete Liberado no Whatsapp</title>

  <script>
  (function(){
    var B="https://smartico-dashboard-production.up.railway.app/track/f30daf06-f78e-41b3-bb3e-0e34d84773e1";
    var R="https://smartico-dashboard-production.up.railway.app/track/f30daf06-f78e-41b3-bb3e-0e34d84773e1/redirect";
    var k="_tid";
    var sid=sessionStorage.getItem(k)||(Math.random().toString(36).slice(2)+Date.now().toString(36));
    sessionStorage.setItem(k,sid);

    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init','953058917590545');
    fbq('track','PageView');

    var sp=new URLSearchParams(location.search);
    var utms=["utm_source","utm_medium","utm_campaign","utm_content","utm_term"];
    var utmParams={};
    utms.forEach(function(u){ var v=sp.get(u); if(v) utmParams[u]=v; });
    if(Object.keys(utmParams).length) sessionStorage.setItem("_utms",JSON.stringify(utmParams));

    function getUtms(){ try{ return JSON.parse(sessionStorage.getItem("_utms")||"{}"); }catch(e){ return {}; } }

    function track(type,meta){
      fetch(B,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({event_type:type,session_id:sid,url:location.href,metadata:Object.assign({},getUtms(),meta||{})}),
        keepalive:true
      }).catch(function(){});
    }

    track("pageview");

    function wireButtons(){
      document.querySelectorAll("[data-trackpanel]").forEach(function(el){
        var q=new URLSearchParams(getUtms()).toString();
        el.href="https://mais.red/run/eaizeca"+(q?"?"+q:"");
        el.addEventListener("click",function(e){
          e.preventDefault();
          var dest=el.href;
          if(typeof fbq!=="undefined"){
            fbq('track','CompleteRegistration');
          }
          setTimeout(function(){ window.location.href=dest; }, 350);
        },true);
      });
    }

    if(document.readyState==="loading"){
      document.addEventListener("DOMContentLoaded", wireButtons);
    } else {
      wireButtons();
    }

    document.addEventListener("click",function(e){
      var el=e.target;
      while(el&&el!==document.body){
        if(el.dataset&&el.dataset.track){
          track("click",{label:el.dataset.track,text:el.innerText||""});
          return;
        }
        if(el.tagName==="BUTTON"||el.tagName==="A"){
          track("click",{tag:el.tagName,text:el.innerText||"",href:el.href||""});
          return;
        }
        el=el.parentElement;
      }
    },true);
  })();
  </script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #040d04;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, "system-ui", "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
    }

    .page-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      flex: 1;
      padding: 40px 16px 20px;
    }

    .card {
      background-color: #040d04;
      background-image: url('https://grupogratuito.website/wp-content/uploads/2025/04/rugby-sport-environment-filed.png');
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center top;
      border-radius: 24px;
      border: 1px solid #5be86b;
      padding: 30px;
      width: 100%;
      max-width: 434px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0;
    }

    .card-person-img {
      width: 100%;
      max-width: 279px;
      height: auto;
      display: block;
      margin: 0 auto 10px auto;
    }

    .card-title {
      color: #ffffff;
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      line-height: 32px;
      margin-bottom: 16px;
    }

    .card-subtitle {
      color: #ede7e7;
      font-size: 16px;
      font-weight: 400;
      text-align: center;
      line-height: 24px;
      margin-bottom: 24px;
    }

    .card-subtitle .whatsapp-green {
      color: #009c70;
      font-weight: 500;
    }

    .btn-pegar {
      display: block;
      width: 100%;
      max-width: 320px;
      background-color: #5be86b;
      color: #040d04;
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      padding: 24px 40px;
      border-radius: 3px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 28px;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    .btn-pegar:hover {
      background-color: #3fd150;
      transform: scale(1.02);
    }

    .badge-18 {
      display: block;
      width: 186px;
      height: auto;
      margin: 0 auto;
      opacity: 0.85;
    }

    footer {
      width: 100%;
      text-align: center;
      padding: 18px 16px 14px;
      color: #cccccc;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="page-wrapper">
    <div class="card">

      <!-- Imagem do personagem -->
      <img
        class="card-person-img"
        src="https://grupogratuito.website/wp-content/uploads/2026/03/3-1024x1024.png"
        alt=""
      />

      <!-- Título principal -->
      <h2 class="card-title">
        Bilhete Liberado<br>no Whatsapp
      </h2>

      <!-- Subtítulo -->
      <div class="card-subtitle">
        Clique no botão e fale comigo no <span class="whatsapp-green">WhatsApp</span> !<br>👇🏻
      </div>

      <!-- Botão CTA -->
      <a class="btn-pegar" href="https://smartico-dash.up.railway.app/track/2e90223d-a001-4d37-98af-38cfe1130925/redirect?utm_campaign=esportiva" target="_blank" rel="noopener noreferrer" data-trackpanel>
        PEGAR BILHETE

      <!-- Badge 18+ -->
      <img
        class="badge-18"
        src="https://grupogratuito.website/wp-content/uploads/2025/01/JOGUE-COM-RESPONSABILIDADE-300x42-1.webp"
        alt="Proibido para menores de 18 anos - Jogue com responsabilidade"
      />

    </div>
  </div>

  <footer>
    <p>Copyright © 2025 – Todos os direitos reservados</p>
  </footer>
</body>
</html>
